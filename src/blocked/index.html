<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site Blocked — BlockThem</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #e6e6e6;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      padding: 40px;
    }
    .shield {
      font-size: 64px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .info {
      font-size: 14px;
      color: #666;
      margin-bottom: 24px;
    }
    .rule-info {
      display: inline-block;
      background: #161b22;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 12px;
      color: #888;
      margin-bottom: 24px;
    }
    .rule-info .pattern {
      color: #6c5ce7;
    }
    .back-btn {
      background: #161b22;
      color: #999;
      border: 1px solid #333;
      padding: 8px 20px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
    }
    .back-btn:hover {
      background: #1c2128;
      color: #e6e6e6;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="shield">🛡️</div>
    <h1>This site is blocked</h1>
    <p class="info" id="info"></p>
    <div class="rule-info" id="rule-info" style="display: none;"></div>
    <div>
      <button class="back-btn" id="back-btn">← Go Back</button>
    </div>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
