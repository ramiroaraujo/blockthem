<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Site Blocked — BlockThem</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #0d1117;
        color: #e6e6e6;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .container {
        text-align: center;
        padding: 40px;
      }
      .shield {
        font-size: 64px;
        margin-bottom: 16px;
      }
      h1 {
        font-size: 28px;
        font-weight: 600;
        margin-bottom: 6px;
      }
      .domain {
        font-size: 14px;
        color: #8b949e;
        margin-top: 6px;
      }
      .stats-header {
        font-size: 11px;
        color: #8b949e;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        text-align: center;
        margin-top: 32px;
        padding-top: 20px;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
        margin-bottom: 16px;
      }
      .stats-row {
        display: flex;
        align-items: baseline;
        justify-content: center;
      }
      .stat-item {
        text-align: center;
        padding: 0 22px;
      }
      .stat-item + .stat-item {
        border-left: 1px solid rgba(255, 255, 255, 0.1);
      }
      .stat-value {
        font-size: 26px;
        font-weight: 700;
        color: #58a6ff;
        line-height: 1.2;
      }
      .stat-label {
        font-size: 11px;
        color: #8b949e;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-top: 16px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="shield">
        <img src="/icons/icon-128.png" alt="" width="64" height="64" />
      </div>
      <h1 id="heading">This site is blocked</h1>
      <p id="domain" class="domain"></p>
      <div id="stats-container" style="display: none">
        <div id="stats-header" class="stats-header">Blocked</div>
        <div id="stats" class="stats-row"></div>
      </div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
