<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Site Blocked — BlockThem</title>
    <style>
      /* Minimal FOUC prevention — Tailwind loads via JS module */
      body {
        background: #0d1117;
        color: #e6e6e6;
      }
    </style>
  </head>
  <body class="flex min-h-screen items-center justify-center font-sans">
    <div class="p-10 text-center">
      <div class="mb-4 text-[64px]">🛡️</div>
      <h1 class="mb-2 text-[28px] font-semibold">This site is blocked</h1>
      <p class="mb-6 text-sm text-text-muted" id="info"></p>
      <div
        class="mb-6 hidden rounded-lg border border-border bg-surface px-4 py-2.5 text-xs text-text-secondary"
        id="rule-info"
      ></div>
      <div>
        <button
          class="rounded-md border border-border bg-surface px-5 py-2 font-inherit text-[13px] text-[#999] hover:bg-hover hover:text-text"
          id="back-btn"
        >
          ← Go Back
        </button>
      </div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
