<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #0d1117;
        color: #e6e6e6;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .container {
        text-align: center;
        padding: 40px;
      }
      .shield {
        font-size: 64px;
        margin-bottom: 16px;
      }
      h1 {
        font-size: 28px;
        font-weight: 600;
        margin-bottom: 8px;
      }
      .info {
        font-size: 14px;
        color: #666;
        margin-bottom: 24px;
      }
      .rule-info {
        display: none;
        background: #161b22;
        border: 1px solid #333;
        border-radius: 8px;
        padding: 10px 16px;
        font-size: 12px;
        color: #888;
        margin-bottom: 24px;
      }
      .rule-info .pattern {
        color: #6c5ce7;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="shield">
        <img src="/icons/icon-128.png" alt="" width="64" height="64" />
      </div>
      <h1 id="heading"></h1>
      <p class="info" id="info"></p>
      <div class="rule-info" id="rule-info"></div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
